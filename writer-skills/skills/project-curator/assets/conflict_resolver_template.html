<!-- Шаблон артефакта «Разрешение конфликта факта».
     Замени плейсхолдер /*CONFLICT_DATA*/ на JS-объект:
       { fact:"Имя факта", note:"(необяз.) почему конфликт",
         variants:[ {source:"путь/файл.md", content:"текст варианта"}, ... ] }
     Передай весь HTML как widget_code в инструмент показа виджета (show_widget).
     Кнопки вызывают глобальную sendPrompt(text) — выбор автора вернётся в чат. -->
<h2 class="sr-only">Выбор источника истины для конфликтующего факта между файлами проекта</h2>
<div id="cr-root" style="padding:0.5rem 0;color:var(--color-text-primary);font-family:var(--font-sans)">
  <style>
    #cr-root h3{font-size:16px;font-weight:500;margin:0 0 2px}
    #cr-root .sub{color:var(--color-text-secondary);font-size:13px;margin:0 0 14px}
    #cr-root .card{border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px 14px;margin:0 0 10px;background:var(--color-background-secondary)}
    #cr-root .card.sel{border-color:var(--color-border-info);background:var(--color-background-info)}
    #cr-root .src{font-family:var(--font-mono);font-size:12px;color:var(--color-text-info);word-break:break-all}
    #cr-root pre{white-space:pre-wrap;font-family:var(--font-mono);font-size:12.5px;line-height:1.5;margin:8px 0 0;max-height:240px;overflow:auto;color:var(--color-text-primary)}
    #cr-root .uniq{background:var(--color-background-warning);color:var(--color-text-warning);border-radius:3px;padding:0 2px}
    #cr-root label.opt{display:flex;gap:8px;align-items:flex-start;cursor:pointer}
    #cr-root textarea{width:100%;box-sizing:border-box;min-height:62px;margin-top:6px;border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px;font:inherit;font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary)}
    #cr-root .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
    #cr-root button{font:inherit;font-size:14px;padding:9px 16px;border-radius:var(--border-radius-md);border:1px solid var(--color-border-secondary);cursor:pointer;background:var(--color-background-primary);color:var(--color-text-primary)}
    #cr-root button.primary{background:var(--color-text-info);color:var(--color-background-primary);border-color:var(--color-text-info)}
    #cr-root .hint{font-size:12px;color:var(--color-text-tertiary);margin-top:6px}
  </style>
  <h3>Конфликт факта: <span id="cr-fact"></span></h3>
  <p class="sub" id="cr-note"></p>
  <div id="cr-cards"></div>
  <div class="card">
    <label class="opt"><input type="radio" name="cr-pick" value="__custom__">
      <span><span style="font-weight:500">Свой вариант / инструкция.</span> Опиши, что сохранить, что отбросить, как свести — своими словами.</span></label>
    <textarea id="cr-custom" placeholder="Напр.: за основу карточку, но дату из файла мира; в Организациях оставить только роль для организации + ссылку."></textarea>
  </div>
  <div class="actions">
    <button class="primary" id="cr-apply">Применить выбор</button>
    <button id="cr-skip">Отложить этот конфликт</button>
  </div>
  <p class="hint">Выбранный файл станет источником истины; в остальных подробное описание заменится на ссылку. Канон не переписывается — только сводится в одно место.</p>
</div>
<script>
(function(){
  const DATA = /*CONFLICT_DATA*/;
  const root=document.getElementById('cr-root');
  document.getElementById('cr-fact').textContent=DATA.fact||'(без имени)';
  document.getElementById('cr-note').textContent=DATA.note||'';
  const vs=DATA.variants||[];
  const sets=vs.map(v=>new Set((v.content||'').split('\n').map(s=>s.trim()).filter(Boolean)));
  const commonSet=new Set(sets.length?[...sets[0]].filter(l=>sets.every(s=>s.has(l))):[]);
  const esc=s=>s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const cards=document.getElementById('cr-cards');
  vs.forEach((v,i)=>{
    const lines=(v.content||'').split('\n').map(l=>{const t=l.trim();return(t&&!commonSet.has(t))?'<span class="uniq">'+esc(l)+'</span>':esc(l);}).join('\n');
    const c=document.createElement('div');c.className='card';c.dataset.idx=i;
    c.innerHTML='<label class="opt"><input type="radio" name="cr-pick" value="'+i+'">'
      +'<span class="src">'+esc(v.source||('вариант '+(i+1)))+'</span></label><pre>'+lines+'</pre>';
    cards.appendChild(c);
  });
  root.addEventListener('change',()=>{
    [...root.querySelectorAll('.card')].forEach(c=>c.classList.remove('sel'));
    const r=root.querySelector('input[name=cr-pick]:checked');
    if(r&&r.value!=='__custom__'){const card=root.querySelector('.card[data-idx="'+r.value+'"]');if(card)card.classList.add('sel');}
  });
  document.getElementById('cr-apply').onclick=()=>{
    const r=root.querySelector('input[name=cr-pick]:checked');
    if(!r){alert('Выбери вариант-источник или «свой вариант».');return;}
    let msg;
    if(r.value==='__custom__'){
      const txt=document.getElementById('cr-custom').value.trim();
      if(!txt){alert('Опиши свою инструкцию в поле ниже.');return;}
      msg='РЕШЕНИЕ ПО КОНФЛИКТУ «'+DATA.fact+'» (свой вариант): '+txt;
    }else{
      const src=vs[+r.value].source;
      const others=vs.filter((_,i)=>i!=+r.value).map(v=>v.source).join(', ');
      msg='РЕШЕНИЕ ПО КОНФЛИКТУ «'+DATA.fact+'»: источник истины = '+src+'. В остальных файлах ('+others+') заменить подробное описание на ссылку на источник.';
      const extra=document.getElementById('cr-custom').value.trim();
      if(extra)msg+=' Доп. указание автора: '+extra;
    }
    if(typeof sendPrompt==='function')sendPrompt(msg);else alert(msg);
  };
  document.getElementById('cr-skip').onclick=()=>{
    const msg='Отложить конфликт «'+DATA.fact+'» — пока не трогать.';
    if(typeof sendPrompt==='function')sendPrompt(msg);else alert(msg);
  };
})();
</script>
